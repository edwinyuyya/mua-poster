<!DOCTYPE html>
<html lang="id">
<head><base target="_top"><?!= include('Styles'); ?></head>
<body>
<script>
  var BASE_URL = <?!= JSON.stringify(baseUrl) ?>;
  var CONFIG = <?!= JSON.stringify(config) ?>;
</script>

<div class="container">
  <div class="between" style="padding:16px 0">
    <div><h1 class="title">💵 Kasir</h1><p class="muted small">Konfirmasi pembayaran &amp; tutup bill</p></div>
    <button class="btn" onclick="go('home')">← Beranda</button>
  </div>
  <div class="row" style="margin-bottom:14px">
    <button class="btn" id="tabActive" onclick="setTab('active')">Aktif</button>
    <button class="btn" id="tabClosed" onclick="setTab('closed')">Selesai</button>
  </div>
  <div id="list"><p class="muted">Memuat…</p></div>
</div>

<script>
var TAB='active', ROWS=[], busy='';
function setTab(t){ TAB=t; styleTabs(); load(); }
function styleTabs(){
  document.getElementById('tabActive').className='btn '+(TAB==='active'?'btn-brand':'');
  document.getElementById('tabClosed').className='btn '+(TAB==='closed'?'btn-brand':'');
}
function load(){ call('apiGetCashier', TAB).then(function(res){ ROWS=res||[]; render(); }); }
styleTabs(); load(); setInterval(load,6000);

function render(){
  if(!ROWS.length){ document.getElementById('list').innerHTML='<div class="card"><p class="muted" style="margin:0">Tidak ada data.</p></div>'; return; }
  var h='<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">';
  ROWS.forEach(function(o){
    var paid=o.payment_status==='paid';
    h+='<div class="card"><div class="between"><div class="bold">#'+o.order_no+' · Meja '+esc(o.table_number)+'</div>'+
       '<span class="badge '+(paid?'badge-green':'badge-amber')+'">'+(paid?'Lunas':'Belum bayar')+'</span></div>';
    h+='<div class="row" style="margin-top:6px"><span class="badge badge-blue">'+esc(o.status)+'</span>'+
       '<span class="badge">'+(o.payment_method==='qris'?'QRIS':'Kasir')+'</span>'+
       (o.customer_name?'<span class="muted small">'+esc(o.customer_name)+'</span>':'')+'</div><hr class="hr"><div class="col" style="gap:4px">';
    (o.items||[]).forEach(function(it){ h+='<div class="between small"><span>'+it.qty+'× '+esc(it.name)+'</span><span>'+rupiah(it.price*it.qty)+'</span></div>'; });
    h+='</div><hr class="hr"><div class="between"><span class="bold">Total</span><span class="bold">'+rupiah(o.total)+'</span></div>';
    if(TAB==='active'){
      h+='<div class="col no-print" style="margin-top:12px;gap:8px">';
      if(!paid) h+='<button class="btn btn-green btn-block" onclick="patch(\''+o.id+'\',{payment_status:\'paid\'})">Tandai Lunas</button>';
      h+='<div class="row"><button class="btn btn-block" onclick="patch(\''+o.id+'\',{status:\'closed\'})">Tutup Bill</button>'+
         '<button class="btn btn-block" onclick="patch(\''+o.id+'\',{status:\'cancelled\'})">Batalkan</button></div>'+
         '<button class="btn btn-block" onclick="go(\'print\',{order:\''+o.id+'\'})">🖨️ Cetak ulang</button></div>';
    }
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('list').innerHTML=h;
}
function patch(id,body){ call('apiUpdateOrder', id, body).then(load); }
</script>
</body>
</html>
