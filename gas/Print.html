<!DOCTYPE html>
<html lang="id">
<head><base target="_top"><?!= include('Styles'); ?></head>
<body>
<script>
  var BASE_URL = <?!= JSON.stringify(baseUrl) ?>;
  var PARAMS = <?!= JSON.stringify(params) ?>;
  var CONFIG = <?!= JSON.stringify(config) ?>;
</script>

<div class="container-sm" id="app" style="padding-top:16px">
  <p class="muted" style="padding-top:24px">Menyiapkan struk…</p>
</div>

<script>
var STATIONS=[{id:'shaokao',name:'STATION SHAOKAO'},{id:'maincourse',name:'STATION MAINCOURSE'},{id:'bar',name:'BAR MINUMAN'}];
var id=PARAMS.order||'';

function fmt(ts){ try{ return new Date(ts).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){return '';} }

call('apiGetOrder', id).then(function(res){
  if(res.error){ document.getElementById('app').innerHTML='<div class="card">Order tidak ditemukan.</div>'; return; }
  render(res.order, res.items);
});

function render(order, items){
  var groups=STATIONS.map(function(s){ return {id:s.id,name:s.name,items:items.filter(function(i){return i.station_id===s.id;})}; });
  var others=items.filter(function(i){return !STATIONS.some(function(s){return s.id===i.station_id;});});
  if(others.length) groups.push({id:'other',name:'LAINNYA',items:others});
  var active=groups.filter(function(g){return g.items.length;});
  var merchant=esc(CONFIG.merchant_name||'Restoran');

  var h='<div class="between no-print"><button class="btn btn-brand" onclick="window.print()">🖨️ Cetak Sekarang</button>'+
        '<button class="btn" onclick="markPrinted()" id="markBtn">Tandai dicetak</button>'+
        '<button class="btn" onclick="go(\'kitchen\')">Tutup</button></div>';
  h+='<p class="muted small no-print" style="margin-top:8px">Satu dokumen berisi '+active.length+' struk station — printer mencetak berurutan dengan pemisah potong.</p>';

  active.forEach(function(s,idx){
    h+='<div class="ticket"><h3>'+merchant+'</h3><h3 style="font-size:16px">'+s.name+'</h3><div class="line"></div>'+
       '<div class="item"><span>Order</span><span>#'+order.order_no+'</span></div>'+
       '<div class="item"><span>Meja</span><span>'+esc(order.table_number)+'</span></div>'+
       '<div class="item"><span>Waktu</span><span>'+fmt(order.created_at)+'</span></div>'+
       '<div class="item"><span>Bayar</span><span>'+(order.payment_status==='paid'?'LUNAS':(order.payment_method==='qris'?'QRIS':'KASIR'))+'</span></div>'+
       '<div class="line"></div>';
    s.items.forEach(function(it){
      h+='<div style="margin-bottom:4px"><div class="item"><span><b>'+it.qty+'x</b> '+esc(it.name)+'</span></div>'+
         (it.note?'<div style="font-style:italic;padding-left:8px">* '+esc(it.note)+'</div>':'')+'</div>';
    });
    h+='<div class="line"></div>'+(order.note?'<div>Catatan order: '+esc(order.note)+'</div>':'')+
       '<div style="text-align:center;margin-top:6px">--- '+s.name+' ---</div></div>';
    if(idx<active.length-1) h+='<div class="cut no-print">✂ — — — — potong — — — — ✂</div>';
  });
  if(!active.length) h+='<div class="card"><p class="muted" style="margin:0">Tidak ada item untuk dicetak.</p></div>';
  document.getElementById('app').innerHTML=h;
}

function markPrinted(){
  var b=document.getElementById('markBtn'); if(b){b.disabled=true;b.textContent='Ditandai ✓';}
  // tandai semua item 'queued' di order ini jadi 'printed'
  call('apiGetOrder', id).then(function(res){
    (res.items||[]).forEach(function(it){ if(it.kitchen_status==='queued') call('apiSetItemStatus', it.id, 'printed'); });
  });
}
</script>
</body>
</html>
