<!DOCTYPE html>
<html lang="id">
<head><base target="_top"><?!= include('Styles'); ?></head>
<body>
<script>
  var BASE_URL = <?!= JSON.stringify(baseUrl) ?>;
  var CONFIG = <?!= JSON.stringify(config) ?>;
</script>

<div class="container">
  <div class="between" style="padding:16px 0">
    <div><h1 class="title">🍳 Kitchen Display</h1>
      <p class="muted small">Auto-refresh 5 detik · 1 printer untuk 3 station</p></div>
    <button class="btn" onclick="go('home')">← Beranda</button>
  </div>
  <div class="row no-print" id="filters" style="flex-wrap:wrap;margin-bottom:14px"></div>
  <div id="board"><p class="muted">Memuat…</p></div>
</div>

<script>
var STATIONS=[{id:'shaokao',name:'Shaokao',cls:'station-shaokao'},
  {id:'maincourse',name:'Maincourse',cls:'station-maincourse'},
  {id:'bar',name:'Bar Minuman',cls:'station-bar'}];
var ORDERS=[], filter='all';

function timeAgo(ts){ var s=Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60) return s+'s lalu'; return Math.floor(s/60)+'m lalu'; }

function renderFilters(){
  var h='<button class="btn '+(filter==='all'?'btn-brand':'')+'" onclick="setFilter(\'all\')">Semua</button>';
  STATIONS.forEach(function(s){ h+='<button class="btn '+(filter===s.id?'btn-brand':'')+'" onclick="setFilter(\''+s.id+'\')">'+s.name+'</button>'; });
  document.getElementById('filters').innerHTML=h;
}
function setFilter(f){ filter=f; renderFilters(); renderBoard(); }

function load(){
  call('apiGetKitchen').then(function(res){ ORDERS=res||[]; renderBoard(); });
}
renderFilters(); load(); setInterval(load,5000);

function renderBoard(){
  var list=ORDERS;
  if(filter!=='all'){
    list=ORDERS.map(function(o){ var c=Object.assign({},o); c.items=o.items.filter(function(i){return i.station_id===filter;}); return c; })
      .filter(function(o){return o.items.length;});
  }
  if(!list.length){ document.getElementById('board').innerHTML='<div class="card"><p class="muted" style="margin:0">Belum ada pesanan aktif.</p></div>'; return; }
  var h='<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(300px,1fr))">';
  list.forEach(function(o){
    h+='<div class="card"><div class="between"><div><span class="bold">#'+o.order_no+'</span> · Meja '+esc(o.table_number)+'</div>'+
       '<span class="badge">'+timeAgo(o.created_at)+'</span></div>';
    h+='<div class="row" style="margin-top:6px"><span class="badge '+(o.payment_status==='paid'?'badge-green':'badge-amber')+'">'+
       (o.payment_status==='paid'?'Lunas':(o.payment_method==='qris'?'Nunggu QRIS':'Bayar kasir'))+'</span></div>';
    if(o.note) h+='<p class="muted small" style="margin-top:6px">Catatan: '+esc(o.note)+'</p>';
    h+='<hr class="hr">';
    STATIONS.forEach(function(s){
      var its=o.items.filter(function(i){return i.station_id===s.id;});
      if(!its.length) return;
      h+='<div class="card '+s.cls+'" style="margin-bottom:8px;padding:10px"><div class="bold small" style="margin-bottom:6px">'+s.name+'</div>';
      its.forEach(function(it){
        h+='<div class="between" style="margin-bottom:6px"><div><span class="bold">'+it.qty+'×</span> '+esc(it.name)+
           (it.note?'<div class="muted small">“'+esc(it.note)+'”</div>':'')+
           '<div><span class="badge '+(it.kitchen_status==='ready'?'badge-green':'badge-blue')+'" style="font-size:10px">'+esc(it.kitchen_status)+'</span></div></div>'+
           '<div class="no-print">'+(it.kitchen_status!=='ready'?
              '<button class="btn" style="padding:4px 8px;font-size:12px" onclick="setStatus(\''+it.id+'\',\'ready\')">Ready</button>':
              '<button class="btn btn-green" style="padding:4px 8px;font-size:12px" onclick="setStatus(\''+it.id+'\',\'served\')">Served</button>')+'</div></div>';
      });
      h+='</div>';
    });
    var others=o.items.filter(function(i){return !STATIONS.some(function(s){return s.id===i.station_id;});});
    if(others.length){ h+='<div class="card" style="margin-bottom:8px;padding:10px"><div class="bold small" style="margin-bottom:6px">Tanpa station</div>';
      others.forEach(function(it){ h+='<div class="between"><span><span class="bold">'+it.qty+'×</span> '+esc(it.name)+'</span>'+
        '<button class="btn" style="padding:4px 8px;font-size:12px" onclick="setStatus(\''+it.id+'\',\'served\')">Served</button></div>'; }); h+='</div>'; }
    h+='<button class="btn btn-brand btn-block no-print" onclick="go(\'print\',{order:\''+o.id+'\'})">🖨️ Cetak Dapur (3 station)</button>';
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('board').innerHTML=h;
}

function setStatus(itemId,status){ call('apiSetItemStatus',itemId,status).then(load); }
</script>
</body>
</html>
