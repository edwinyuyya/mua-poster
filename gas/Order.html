<!DOCTYPE html>
<html lang="id">
<head><base target="_top"><?!= include('Styles'); ?></head>
<body>
<script>
  var BASE_URL = <?!= JSON.stringify(baseUrl) ?>;
  var PARAMS = <?!= JSON.stringify(params) ?>;
  var CONFIG = <?!= JSON.stringify(config) ?>;
</script>

<div class="container-sm" id="app" style="padding-top:16px;padding-bottom:40px">
  <p class="muted" style="padding-top:24px">Memuat pesanan…</p>
</div>

<script>
var ORDER=null, ITEMS=[], confirming=false, poll=null;
var STATUS_LABEL={open:'Pesanan diterima',preparing:'Sedang disiapkan',served:'Sudah disajikan',closed:'Selesai',cancelled:'Dibatalkan'};
var id=PARAMS.id||'';

function load(){
  return call('apiGetOrder', id).then(function(res){
    if(res.error){ document.getElementById('app').innerHTML='<div class="card" style="margin-top:40px"><h1 class="title">Order tidak ditemukan</h1></div>'; return; }
    ORDER=res.order; ITEMS=res.items; render();
  });
}
load().then(function(){
  poll=setInterval(function(){
    if(!ORDER || ORDER.status==='closed' || ORDER.status==='cancelled'){ clearInterval(poll); return; }
    load();
  },5000);
});

function qrisUrl(){
  var payload = (CONFIG.qris_static && CONFIG.qris_static!=='') ? CONFIG.qris_static :
    ('QRIS|MERCHANT:'+(CONFIG.merchant_name||'Restoran')+'|ORDER:'+ORDER.order_no+'|AMOUNT:'+ORDER.total);
  return 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&data='+encodeURIComponent(payload);
}

function render(){
  var paid=ORDER.payment_status==='paid';
  var isQris=ORDER.payment_method==='qris';
  var h='';
  h+='<div class="muted small">'+esc(CONFIG.merchant_name||'Restoran')+'</div>';
  h+='<h1 class="title">Pesanan #'+ORDER.order_no+'</h1>';
  h+='<div class="row" style="margin-top:6px"><span class="badge">Meja '+esc(ORDER.table_number)+'</span>'+
     '<span class="badge badge-blue">'+esc(STATUS_LABEL[ORDER.status]||ORDER.status)+'</span>'+
     '<span class="badge '+(paid?'badge-green':'badge-amber')+'">'+(paid?'Lunas':'Belum bayar')+'</span></div>';

  if(!paid && isQris){
    h+='<div class="card" style="margin-top:16px;text-align:center"><div class="h2">Scan untuk bayar (QRIS)</div>'+
       '<img src="'+qrisUrl()+'" alt="QRIS" style="width:240px;height:240px;margin:12px auto;background:#fff;border-radius:12px;padding:8px">'+
       '<div class="bold" style="font-size:20px">'+rupiah(ORDER.total)+'</div>'+
       '<p class="muted small" style="margin-top:8px">Setelah membayar, tekan tombol di bawah untuk konfirmasi.</p>'+
       '<button class="btn btn-green btn-block" style="margin-top:8px" id="payBtn" onclick="confirmPaid()">Saya sudah bayar</button></div>';
  } else if(!paid && !isQris){
    h+='<div class="card" style="margin-top:16px"><div class="h2">Bayar di Kasir</div>'+
       '<p class="muted small" style="margin-top:6px">Tunjukkan nomor pesanan <b>#'+ORDER.order_no+'</b> di kasir untuk membayar <b>'+rupiah(ORDER.total)+'</b>.</p></div>';
  } else {
    h+='<div class="card" style="margin-top:16px;border-color:var(--green)"><div class="h2" style="color:#5ee996">Pembayaran diterima ✓</div>'+
       '<p class="muted small" style="margin-top:6px">Pesananmu sedang diproses dapur. Terima kasih!</p></div>';
  }

  h+='<div class="card" style="margin-top:16px"><div class="h2" style="margin-bottom:10px">Rincian Pesanan</div><div class="col">';
  ITEMS.forEach(function(it){
    h+='<div class="between"><div><span class="bold">'+it.qty+'×</span> '+esc(it.name)+
       (it.note?'<div class="muted small">“'+esc(it.note)+'”</div>':'')+'</div><span>'+rupiah(it.price*it.qty)+'</span></div>';
  });
  h+='</div><hr class="hr"><div class="between"><span class="muted">Subtotal</span><span>'+rupiah(ORDER.subtotal)+'</span></div>';
  if(ORDER.tax>0) h+='<div class="between" style="margin-top:6px"><span class="muted">Pajak</span><span>'+rupiah(ORDER.tax)+'</span></div>';
  h+='<hr class="hr"><div class="between"><span class="bold">Total</span><span class="bold">'+rupiah(ORDER.total)+'</span></div></div>';
  document.getElementById('app').innerHTML=h;
}

function confirmPaid(){
  if(confirming) return; confirming=true;
  var b=document.getElementById('payBtn'); if(b){b.disabled=true;b.textContent='Memproses…';}
  call('apiUpdateOrder', id, {payment_status:'paid'}).then(function(res){
    confirming=false; if(res.order){ORDER=res.order;ITEMS=res.items;} render();
  });
}
</script>
</body>
</html>
